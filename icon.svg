<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#101418"/>
  <!-- ballistic trajectory arc (green velocity trace) cresting toward the target -->
  <path d="M 64 392 Q 196 150 392 132" fill="none" stroke="#9fd6a8" stroke-width="15"
        stroke-linecap="round" opacity="0.92"/>
  <!-- reticle ring -->
  <circle cx="256" cy="256" r="142" fill="none" stroke="#ffb454" stroke-width="18"/>
  <!-- crosshair arms with center gap -->
  <g stroke="#ffb454" stroke-width="16" stroke-linecap="round">
    <line x1="256" y1="84"  x2="256" y2="208"/>
    <line x1="256" y1="304" x2="256" y2="428"/>
    <line x1="84"  y1="256" x2="208" y2="256"/>
    <line x1="304" y1="256" x2="428" y2="256"/>
  </g>
  <!-- mil-dot stadia on the lower vertical (holdover marks) -->
  <g stroke="#ffb454" stroke-width="9" stroke-linecap="round">
    <line x1="234" y1="338" x2="278" y2="338"/>
    <line x1="239" y1="368" x2="273" y2="368"/>
    <line x1="244" y1="398" x2="268" y2="398"/>
  </g>
  <!-- center aiming dot -->
  <circle cx="256" cy="256" r="11" fill="#ffb454"/>
</svg>
